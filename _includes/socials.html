<ul class="social-links">
	{% for socials in site.data.socials %}
	  <li><a href="{{ socials.href }}" target="_blank" rel="noopener noreferrer" aria-label="{{ socials.label | default: socials.title }} — {{ site.author }}"><span class="icon-{{ socials.title }} socials" aria-hidden="true"></span></a></li>
	{% endfor %}
</ul>
